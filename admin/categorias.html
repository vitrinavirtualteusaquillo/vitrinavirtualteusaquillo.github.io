<div class="modal fade" id="modalCategoria" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Nueva categoría

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label class="form-label">

                        Nombre

                    </label>

                    <input
                        id="categoriaNombre"
                        type="text"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Descripción

                    </label>

                    <textarea
                        id="categoriaDescripcion"
                        class="form-control"
                        rows="3"></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Icono Bootstrap

                    </label>

                    <input
                        id="categoriaIcono"
                        type="text"
                        class="form-control"
                        placeholder="bi bi-heart">

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancelar

                </button>

                <button
                    id="btnGuardarCategoria"
                    class="btn btn-primary">

                    Guardar

                </button>

            </div>

        </div>

    </div>

</div>

<body>

    <!-- Navbar -->
    <div id="adminSidebar"></div>

    <!-- Contenido -->
    <main>
<div class="admin-content">
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Categorías</h1>

        <button
            id="btnNuevaCategoria"
            class="btn btn-primary">

            Nueva categoría

        </button>

    </div>

    <div class="card">

        <div class="card-body">

        <div class="table-responsive">

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>Nombre</th>

                        <th>Slug</th>

                        <th>Estado</th>

                        <th width="180">Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaCategorias">

                </tbody>

            </table>

            </div>

        </div>

    </div>

</div>
</div>
