<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Emprendimientos | Admin</title>

    <meta
        name="description"
        content="DESCRIPCIÓN DE LA PÁGINA">

    <!-- Favicon -->
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/favicon/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <link rel="stylesheet" href="../assets/css/components.css">

    <link rel="stylesheet" href="../assets/css/pages.css">
    <link rel="stylesheet" href="../assets/css/admin.css">

</head>

<div class="modal fade"
     id="modalEmprendimiento"
     tabindex="-1">

    <div class="modal-dialog modal-xl">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Nuevo emprendimiento

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <ul class="nav nav-tabs mb-4" id="tabsEmprendimiento">

    <li class="nav-item">

        <button
            class="nav-link active"
            data-bs-toggle="tab"
            data-bs-target="#tabInformacion">

            Información

        </button>

    </li>

    <li class="nav-item">

        <button
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#tabImagenes">

            Imágenes

        </button>

    </li>

</ul>

<div class="tab-content">

    <div
        class="tab-pane fade show active"
        id="tabInformacion">

        <div class="modal-body">

                <div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">

            Nombre

        </label>

        <input
            id="nombre"
            class="form-control">

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">

            Categoría

        </label>

        <select
            id="categoria"
            class="form-select">

        </select>

    </div>

    <div class="col-12 mb-3">

        <label class="form-label">

            Descripción corta

        </label>

        <textarea
            id="descripcionCorta"
            rows="3"
            class="form-control"></textarea>

    </div>

    <div class="col-12 mb-3">

        <label class="form-label">

            Descripción completa

        </label>

        <textarea
            id="descripcion"
            rows="6"
            class="form-control"></textarea>

    </div>

</div>

<div class="row mt-3">

    <div class="col-md-6 mb-3">

        <label class="form-label">

            WhatsApp

        </label>

        <input
            id="whatsapp"
            class="form-control">

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">

            Teléfono

        </label>

        <input
            id="telefono"
            class="form-control">

    </div>

    <div class="col-12 mb-3">

        <label class="form-label">

            Correo electrónico

        </label>

        <input
            id="correo"
            type="email"
            class="form-control">

    </div>

</div>
<div class="row mt-3">

    <div class="col-md-4 mb-3">

        <label class="form-label">

            Instagram

        </label>

        <input
            id="instagram"
            class="form-control">

    </div>

    <div class="col-md-4 mb-3">

        <label class="form-label">

            Facebook

        </label>

        <input
            id="facebook"
            class="form-control">

    </div>

    <div class="col-md-4 mb-3">

        <label class="form-label">

            Sitio web

        </label>

        <input
            id="paginaWeb"
            class="form-control">

    </div>

</div>

<div class="row mt-3">

    <div class="col-md-6">

        <div class="form-check">

            <input
                id="visible"
                class="form-check-input"
                type="checkbox"
                checked>

            <label class="form-check-label">

                Visible

            </label>

        </div>

    </div>

    <div class="col-md-6">

        <div class="form-check">

            <input
                id="destacado"
                class="form-check-input"
                type="checkbox">

            <label class="form-check-label">

                Destacado

            </label>

        </div>

    </div>

</div>

            </div>

    </div>

    <div
        class="tab-pane fade"
        id="tabImagenes">

        <div class="row">

    <div class="col-md-6">

        <h5>Logo</h5>

        <img
            id="previewLogo"
            class="img-fluid border rounded mb-3"
            src="../assets/img/placeholders/logo-placeholder.png">

        <input
            id="inputLogo"
            type="file"
            class="form-control">

    </div>

    <div class="col-md-6">

        <h5>Portada</h5>

        <img
            id="previewPortada"
            class="img-fluid border rounded mb-3"
            src="../assets/img/placeholders/cover.jpg">

        <input
            id="inputPortada"
            type="file"
            class="form-control">

    </div>

</div>

<hr>

<h5>Galería</h5>

<div
    id="galeriaAdmin"
    class="row g-3 mb-3">

    <div class="col-12 text-center text-muted">

        No hay imágenes.

    </div>

</div>

<input
    id="inputGaleria"
    type="file"
    multiple
    class="form-control">

    </div>

</div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancelar

                </button>

                <button
                    id="btnGuardarEmprendimiento"
                    class="btn btn-primary">

                    Guardar

                </button>

            </div>

        </div>

    </div>

</div>

<body>

    <!-- Navbar -->
    <div id="adminSidebar"></div>

    <!-- Contenido -->
    <main>

    <div class="admin-content">

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Emprendimientos</h1>

        <button
            id="btnNuevoEmprendimiento"
            class="btn btn-primary">

            Nuevo emprendimiento

        </button>

    </div>

    <div class="card">

        <div class="card-body">

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>

                    <tr>

                        <th>Logo</th>

                        <th>Nombre</th>

                        <th>Categoría</th>

                        <th>Visible</th>

                        <th>Destacado</th>

                        <th width="180">Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaEmprendimientos">

                </tbody>

            </table>

            </div>

        </div>

    </div>

</div>
</div>
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>

    <!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../assets/js/config.js"></script>

<script src="../assets/js/services/supabase.js"></script>

<script src="../assets/js/services/auth.service.js"></script>

<script src="../assets/js/services/categorias.service.js"></script>

<script src="../assets/js/services/emprendimientos.service.js"></script>

<script src="../assets/js/utils/image.utils.js"></script>

<script src="../assets/js/services/storage.service.js"></script>

<script src="../assets/js/admin/emprendimientos.js"></script>

<script src="../assets/js/components/admin-sidebar.js"></script>

<script src="../assets/js/app.js"></script>

</body>

</html>
